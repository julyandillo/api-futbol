nelmio_api_doc:
    documentation:
        info:
            title: API Fútbol
            description: API Fútbol, gestiona competiciones, equipos y jugadores
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
            schemas:
              OK:
                type: object
                required:
                  - code
                properties:
                  code:
                    type: integer
                    description: "HTTP Status Code"
              Created:
                allOf:
                  - $ref: '#/components/schemas/OK'
                  - type: object
                  - properties:
                      status:
                        type: integer
                        example: 201
                      id:
                        type: integer
                        description: "ID de la nueva entidad recién creada"
                  - required:
                      - id
              Error:
                type: object
                discriminator:
                  propertyName: status
                properties:
                  status:
                    type: integer
                    format: int32
                    minimum: 400
                    maximum: 599
                    description: "HTTP Status Code"
                    example: 500
                  message:
                    type: string
                    description: "Detalles del error"
                  timestamp:
                    type: datetime
                    description: "Fecha y hora de la respuesta en formato ISO 8696"
                required:
                  - status
                  - message
              Mensaje:
                  type: object
                  properties:
                      status:
                          type: integer
                          example: 500
                      message:
                          type: string
                          example: "Contenido del mensaje"
              404: ## '404' se usará como valor del campo code (discriminator)
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      status:
                        example: 404
                      message:
                        example: "Entidad no encontrada"
              400:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      message:
                        example: "No se puede realizar la petición, faltan parámetros obligatorios o está mal formada"
                      status:
                        example: 400
              422:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      message:
                        example: 'No se puede procesar la petición, ha ocurrido un error de validación'
                      status:
                        example: 422
              EquipoPlantilla:
                  type: object
                  properties:
                      id:
                          type: integer
                      nombre:
                          type: string
                      pais:
                          type: string
                      plantilla:
                          type: integer
        security:
            - Bearer: [ ]

    areas: # to filter documented areas
        path_patterns:
            - ^/api(?!/(doc|autenticacion)$) # Accepts routes under /api except /api/doc and /api/autenticacion

    use_validation_groups: true